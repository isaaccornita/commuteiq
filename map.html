<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMMUTEIQ - Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<style>
html, body { height:100%; margin:0; font-family:'Inter',sans-serif; background:#1e1e2f; color:#fff; }
#map { width:100%; height:100%; }

/* Bottom panels stacked smaller */
.bottom-panel {
  position: fixed; left:10px; right:10px;
  background: rgba(30,30,47,0.95);
  border-radius:12px;
  box-shadow:0 -4px 10px rgba(0,0,0,0.4);
  padding:6px 10px; z-index:1000;
  transition: transform 0.3s ease;
  max-height: 140px; overflow:hidden;
}

/* Panel headers */
.bottom-panel h3 {
  margin:0; display:flex; justify-content:space-between; align-items:center;
  cursor:pointer; font-size:13px; font-weight:600; padding:3px 0;
}

/* Collapsed panels show only header */
.bottom-panel.collapsed .panel-content { display:none; }

/* Stacked positions */
#distancePanel { bottom:10px; }
#transportPanel { bottom:160px; }
#alertsPanel { bottom:310px; }
#stationsPanel { bottom:460px; }

/* List styling */
ul{ padding-left:15px; margin:0; } 
li{ margin-bottom:3px; font-size:13px; }

/* Toggle button */
#toggleBtn{
  position:fixed; bottom:10px; right:20px; z-index:1101;
  padding:8px 12px; border:none; border-radius:10px;
  background:#42e695; color:#000; font-weight:600; cursor:pointer;
  font-size:13px;
}
</style>
</head>
<body>

<div id="map"></div>

<!-- Panels -->
<div id="stationsPanel" class="bottom-panel">
  <h3>Stations & Terminals <span>–</span></h3>
  <div class="panel-content">
    <ul id="stations-list"></ul>
  </div>
</div>

<div id="alertsPanel" class="bottom-panel">
  <h3>Traffic Alerts <span>–</span></h3>
  <div class="panel-content">
    <ul>
      <li>⚠️ Heavy traffic near EDSA Quezon Ave</li>
      <li>🚧 Construction on España Blvd</li>
      <li>🚑 Accident near C.M. Recto</li>
    </ul>
  </div>
</div>

<div id="transportPanel" class="bottom-panel">
  <h3>Transport Options <span>–</span></h3>
  <div class="panel-content">
    <ul></ul>
  </div>
</div>

<div id="distancePanel" class="bottom-panel">
  <h3>Distance & Duration <span>–</span></h3>
  <div class="panel-content">
    <p id="distance">Distance: -- km</p>
    <p id="duration">Duration: -- mins</p>
  </div>
</div>

<button id="toggleBtn" onclick="toggleAllPanels()">Toggle Panels</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script>
// Start & end
const startName = "FEU Manila";
const endName = "FEU Diliman";

// Initialize map
const map = L.map('map').setView([14.63, 121.05], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    subdomains: 'abcd',
    maxZoom: 19,
    opacity: 0.95
}).addTo(map);
map.whenReady(()=>map.invalidateSize());

// Locations
const locations = {
    "FEU Manila":[14.607621,121.051903],
    "FEU Diliman":[14.651686,121.074436],
    "Quezon City":[14.676,121.043],
    "FEU Alabang":[14.4082,121.038]
};

const start = L.latLng(...locations[startName]);
const destination = L.latLng(...locations[endName]);

// Stations & Terminals
const stations = [
    {name:"FEU Manila Station", lat:14.607621, lng:121.051903},
    {name:"Tricycle Terminal 1", lat:14.6085, lng:121.0525},
    {name:"Tricycle Terminal 2", lat:14.6070, lng:121.0500},
    {name:"Visayas Avenue Station", lat:14.6765, lng:121.0430},
    {name:"Elliptical Road Station", lat:14.6490, lng:121.0290},
    {name:"Commonwealth Avenue Station", lat:14.6480, lng:121.0370},
    {name:"FEU Diliman Station", lat:14.651686, lng:121.074436}
];

stations.forEach(s=>{
    const li=document.createElement('li');
    li.textContent=s.name;
    document.getElementById('stations-list').appendChild(li);

    const iconUrl=s.name.includes("Tricycle")?
        'https://maps.gstatic.com/mapfiles/ms2/micons/orange-dot.png':
        'https://maps.gstatic.com/mapfiles/ms2/micons/blue-dot.png';

    L.marker([s.lat,s.lng],{icon:L.icon({iconUrl:iconUrl,iconSize:[32,32]})}).addTo(map)
     .bindPopup(`<b>${s.name}</b>`);
});

// Live GPS
let userMarker;
if(navigator.geolocation){
    navigator.geolocation.watchPosition(pos=>{
        const userLatLng=L.latLng(pos.coords.latitude,pos.coords.longitude);
        if(!userMarker){
            userMarker=L.marker(userLatLng,{icon:L.icon({iconUrl:'https://maps.gstatic.com/mapfiles/ms2/micons/man.png',iconSize:[32,32]})})
                .addTo(map).bindPopup("You are here").openPopup();
            map.setView(userLatLng,14);
        } else userMarker.setLatLng(userLatLng);
    }, err=>console.error(err), {enableHighAccuracy:true});
}

// Routing
let waypoints=[start,destination];
if(startName==="FEU Manila" && endName==="FEU Diliman"){
    waypoints=[
        L.latLng(...locations["FEU Manila"]),
        L.latLng(14.6185,121.0535),
        L.latLng(14.6390,121.0580),
        L.latLng(...locations["FEU Diliman"])
    ];
}

const routeControl = L.Routing.control({
    waypoints: waypoints,
    router:L.Routing.osrmv1({serviceUrl:'https://router.project-osrm.org/route/v1'}),
    lineOptions:{styles:[{color:'#42e695', weight:5}]},
    createMarker: function(i, wp){
        if(i===0) return L.marker(wp.latLng,{icon:L.icon({iconUrl:'https://maps.gstatic.com/mapfiles/ms2/micons/green.png',iconSize:[32,32]})});
        if(i===waypoints.length-1) return L.marker(wp.latLng,{icon:L.icon({iconUrl:'https://maps.gstatic.com/mapfiles/ms2/micons/red.png',iconSize:[32,32]})});
        return null;
    },
    routeWhileDragging:false,
    addWaypoints:false,
    show:false
}).addTo(map);

// Update Distance & Duration + Transport
routeControl.on('routesfound', e=>{
    const route=e.routes[0];
    const distanceKm=(route.summary.totalDistance/1000).toFixed(2);
    const durationMin=Math.round(route.summary.totalTime/60);

    document.getElementById('distance').textContent=`Distance: ${distanceKm} km`;
    document.getElementById('duration').textContent=`Duration: ${durationMin} mins`;

    const transportSpeeds={"Jeep/Bus":40,"MRT/LRT":50,"Grab/Taxi":45,"Tricycle":20};
    const transportCosts={"Jeep/Bus":134,"MRT/LRT":161,"Grab/Taxi":336,"Tricycle":50};

    const list=document.getElementById('transportPanel').querySelector('ul');
    list.innerHTML='';

    Object.keys(transportSpeeds).forEach(mode=>{
        const time=Math.round(distanceKm/transportSpeeds[mode]*60);
        const li=document.createElement('li');
        li.textContent=`${mode}: approx. ${time} mins, ₱${transportCosts[mode]}`;
        list.appendChild(li);
    });
});

// Single toggle for all panels
function toggleAllPanels() {
    const panels = ['distancePanel','transportPanel','alertsPanel','stationsPanel'];
    panels.forEach(id => {
        const panel = document.getElementById(id);
        panel.classList.toggle('collapsed');
        const span = panel.querySelector('h3 span');
        span.textContent = panel.classList.contains('collapsed') ? '+' : '–';
    });
    setTimeout(()=>map.invalidateSize(),300);
}
</script>

</body>
</html>
