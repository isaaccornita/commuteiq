<!DOCTYPE html>
<html>
<head>
  <title>COMMUTEIQ: Smarter Routes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family: Arial;
      text-align:center;
      background:#f4f6f8;
      padding:20px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:10px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      max-width:400px;
      margin:auto;
    }

    input,button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button{
      background:#2b7cff;
      color:white;
      border:none;
    }
  </style>
</head>

<body>

<div class="card">
<h2>COMMUTEIQ</h2>
<p>Smarter Routes for Commuters</p>

<input type="text" placeholder="Enter Starting Point">
<input type="text" placeholder="Enter Destination">

<button onclick="showRoute()">Find Route</button>

<p id="result"></p>

</div>

<script>
function showRoute(){
document.getElementById("result").innerHTML =
"Recommended Route: Take an E-Jeep via Commonwealth Avenue. Estimated Fare: ₱25. Time: 20 mins.";
}
</script>

</body>
</html>
