<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMMUTEIQ - FEU Manila to FEU Diliman</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>
<style>
html, body { height:100%; margin:0; font-family:sans-serif; }
#map { width:100%; height:100%; }

.panel{
  position:absolute; left:10px; background:rgba(255,255,255,0.95);
  padding:10px; border-radius:10px; z-index:1000; width:220px;
}
.panel h3{ cursor:pointer; margin:0; display:flex; justify-content:space-between; align-items:center; font-size:16px;}
.panel-content{ margin-top:5px; font-size:14px;}
button.toggle-btn{ background:#1e3c72;color:white;padding:0 5px;border-radius:3px; font-size:14px; cursor:pointer; }

#distancePanel{top:10px;}
#transport{top:130px;}
#alerts{top:250px;}
#stations{top:370px;}

@media screen and (max-width:600px){
  .panel{ width:90%; left:50%; transform:translateX(-50%);}
  #distancePanel{top:auto; bottom:290px;}
  #transport{top:auto; bottom:210px;}
  #alerts{top:auto; bottom:130px;}
  #stations{top:auto; bottom:50px;}
  .panel h3{ font-size:18px;}
  .panel-content{ font-size:16px;}
}
</style>
</head>
<body>
<div id="map"></div>

<div id="distancePanel" class="panel">
  <h3>Distance & Duration <button class="toggle-btn" onclick="togglePanel('distancePanel')">–</button></h3>
  <div class="panel-content">
    <p id="distance">Distance: -- km</p>
    <p id="duration">Duration: -- mins</p>
  </div>
</div>

<div id="transport" class="panel">
  <h3>Transport Suggestions <button class="toggle-btn" onclick="togglePanel('transport')">–</button></h3>
  <div class="panel-content">
    <ul>
      <li>Jeep/Bus: approx. ₱134</li>
      <li>MRT/LRT: approx. ₱161</li>
      <li>Grab/Taxi: approx. ₱336</li>
    </ul>
  </div>
</div>

<div id="alerts" class="panel">
  <h3>Traffic Alerts <button class="toggle-btn" onclick="togglePanel('alerts')">–</button></h3>
  <div class="panel-content">
    <ul>
      <li>Heavy traffic near EDSA Quezon Ave</li>
      <li>Construction on España Blvd</li>
      <li>Accident near C.M. Recto</li>
    </ul>
  </div>
</div>

<div id="stations" class="panel">
  <h3>Stations & Terminals <button class="toggle-btn" onclick="togglePanel('stations')">–</button></h3>
  <div class="panel-content">
    <ul id="stations-list"></ul>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script>
// Initialize map
const map = L.map('map').setView([14.62,121.05],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap contributors', subdomains:'abcd', maxZoom:19, opacity:0.95
}).addTo(map);

// FEU Manila → FEU Diliman
const start = L.latLng(14.6076,121.0519); // FEU Manila
const destination = L.latLng(14.6543,121.0734); // FEU Diliman

// Stations & terminals (Metro Manila only)
const stations = [
  {name:"FEU Manila Station", lat:14.6076, lng:121.0519},
  {name:"Tricycle Terminal 1", lat:14.6085, lng:121.0525},
  {name:"Tricycle Terminal 2", lat:14.6070, lng:121.0500},
  {name:"Visayas Avenue Station", lat:14.6765, lng:121.0430},
  {name:"Elliptical Road Station", lat:14.6490, lng:121.0290},
  {name:"Commonwealth Avenue Station", lat:14.6480, lng:121.0370},
  {name:"FEU Diliman Station", lat:14.6543, lng:121.0734},
];

stations.forEach(s=>{
  const li = document.createElement('li');
  li.textContent = s.name;
  document.getElementById('stations-list').appendChild(li);

  const iconUrl = s.name.includes("Tricycle") ? 'https://maps.gstatic.com/mapfiles/ms2/micons/orange-dot.png' : 'https://maps.gstatic.com/mapfiles/ms2/micons/blue-dot.png';
  const marker = L.marker([s.lat,s.lng],{icon:L.icon({iconUrl:iconUrl,iconSize:[32,32]})}).addTo(map);
  marker.bindPopup(`<b>${s.name}</b>`);
});

// Live GPS marker
let userMarker;
if(navigator.geolocation){
  navigator.geolocation.watchPosition(pos=>{
    const userLatLng = L.latLng(pos.coords.latitude,pos.coords.longitude);
    if(!userMarker){
      userMarker = L.marker(userLatLng,{
        icon:L.icon({iconUrl:'https://maps.gstatic.com/mapfiles/ms2/micons/man.png',iconSize:[32,32]})
      }).addTo(map).bindPopup("You are here").openPopup();
      map.setView(userLatLng,14);
    } else userMarker.setLatLng(userLatLng);
  }, err=>console.error(err), {enableHighAccuracy:true});
} else alert("Geolocation not supported");

// Route with green line
let routeControl = L.Routing.control({
  waypoints:[start,destination],
  lineOptions:{styles:[{color:'#42e695',weight:5}]},
  createMarker:i=>i===0 ? L.marker(start,{icon:L.icon({iconUrl:'https://maps.gstatic.com/mapfiles/ms2/micons/green.png',iconSize:[32,32]})}) :
             i===1 ? L.marker(destination,{icon:L.icon({iconUrl:'https://maps.gstatic.com/mapfiles/ms2/micons/red.png',iconSize:[32,32]})}) : null,
  routeWhileDragging:false,
  addWaypoints:false
}).addTo(map);

// Update Distance & Duration dynamically
routeControl.on('routesfound', e=>{
  const route = e.routes[0];
  document.getElementById('distance').textContent = `Distance: ${(route.summary.totalDistance/1000).toFixed(2)} km`;
  document.getElementById('duration').textContent = `Duration: ${Math.round(route.summary.totalTime/60)} mins`;
});

// Panel toggle
function togglePanel(id){
  const content = document.getElementById(id).querySelector('.panel-content');
  const btn = document.querySelector('#'+id+' .toggle-btn');
  if(content.style.display==='none'){ content.style.display='block'; btn.textContent='–'; }
  else { content.style.display='none'; btn.textContent='+'; }
}
</script>
</body>
</html>
