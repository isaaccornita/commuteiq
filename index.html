<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMMUTEIQ Map - OpenStreetMap</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<style>
  body, html { margin:0; padding:0; height:100%; font-family:sans-serif; }
  #map { width:100%; height:100%; }
  #info { position:absolute; top:10px; left:10px; background:rgba(255,255,255,0.9); padding:10px; border-radius:10px; z-index:1000; }
</style>
</head>
<body>

<div id="map"></div>
<div id="info">
  <p id="distance">Distance: calculating...</p>
  <p id="duration">Duration: calculating...</p>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // Metro Manila center
  const center = [14.646, 121.035];

  // Initialize map
  const map = L.map('map').setView(center, 12);

  // OSM tile layer
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Get start/end from URL
  const urlParams = new URLSearchParams(window.location.search);
  const start = urlParams.get('start') || "Quezon City";
  const end = urlParams.get('end') || "Makati City";

  // FEU Metro Manila + major cities coordinates
  const locations = {
    "Quezon City":[14.6760, 121.0437],
    "FEU Diliman":[14.6543, 121.0734],
    "FEU Manila":[14.6090, 120.9920],
    "FEU Alabang":[14.4144, 121.0419],
    "Makati City":[14.5547, 121.0244],
    "Pasig City":[14.5764, 121.0851],
    "Taguig City":[14.5176, 121.0509],
    "Manila City":[14.5995, 120.9842],
    "Caloocan City":[14.7569, 121.0450],
    "Pasay City":[14.5366, 121.0011]
  };

  const startCoord = locations[start];
  const endCoord = locations[end];

  if(!startCoord || !endCoord){
    alert("Invalid start or end location.");
  }

  // Add markers
  const startMarker = L.marker(startCoord).addTo(map).bindPopup(start).openPopup();
  const endMarker = L.marker(endCoord).addTo(map).bindPopup(end).openPopup();

  // Draw route using Leaflet Routing Machine
  // Include Leaflet Routing Machine CSS/JS
</script>

<!-- Leaflet Routing Machine CSS/JS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
  L.Routing.control({
    waypoints: [
      L.latLng(startCoord[0], startCoord[1]),
      L.latLng(endCoord[0], endCoord[1])
    ],
    routeWhileDragging: false,
    lineOptions: { styles: [{ color: '#42e695', weight: 5 }] },
    createMarker: function(i, wp, nWps) {
      return L.marker(wp.latLng, {icon: L.icon({iconUrl: i===0?'https://maps.gstatic.com/mapfiles/ms2/micons/green.png':'https://maps.gstatic.com/mapfiles/ms2/micons/red.png',iconSize:[32,32]})});
    }
  }).addTo(map);
</script>

</body>
</html>
