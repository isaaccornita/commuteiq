<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMMUTEIQ Map - Realistic Traffic</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
<style>
html, body { height:100%; margin:0; font-family:sans-serif; }
#map { width:100%; height:100%; }
#info, #transport, #alerts, #report {
  position:absolute; left:10px; background:rgba(255,255,255,0.9);
  padding:10px; border-radius:10px; z-index:1000; width:220px;
}
#info{top:10px;} #transport{top:110px;} #alerts{top:250px;} #report{top:380px;}
button { cursor:pointer; background:#1e3c72;color:white;padding:5px 10px;border-radius:5px;margin-top:5px;}
</style>
</head>
<body>
<div id="map"></div>
<div id="info">
  <p id="distance">Distance: calculating...</p>
  <p id="duration">Duration: calculating...</p>
</div>
<div id="transport">
  <p><strong>Suggested Transportation:</strong></p>
  <ul id="transport-list"></ul>
</div>
<div id="alerts">
  <p><strong>Traffic Alerts:</strong></p>
  <ul id="alert-list"></ul>
</div>
<div id="report">
  <p><strong>Report Traffic Issue:</strong></p>
  <input id="report-text" placeholder="Describe issue" style="width:100%;margin-bottom:5px;">
  <button onclick="submitReport()">Submit</button>
  <ul id="report-list"></ul>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
// Initialize map
const map = L.map('map').setView([14.646,121.035],12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap contributors', subdomains:'abcd', maxZoom:19
}).addTo(map);

// Campus locations
const locations = {
  "Quezon City":[14.6760,121.0437],
  "FEU Diliman":[14.6543,121.0734],
  "FEU Manila":[14.6090,120.9920],
  "FEU Alabang":[14.4144,121.0419]
};

const params = new URLSearchParams(window.location.search);
const startName = params.get('start') || "Quezon City";
const endName = params.get('end') || "FEU Diliman";
const start = locations[startName];
const end = locations[endName];
if(!start||!end){ alert("Invalid location"); }

// Known traffic hotspots (lat,lng bounds)
const trafficZones = [
  {name:"EDSA Quezon Ave", latMin:14.620, latMax:14.680, lngMin:121.010, lngMax:121.050},
  {name:"España Blvd", latMin:14.620, latMax:14.650, lngMin:121.020, lngMax:121.080},
  {name:"C.M. Recto Ave", latMin:14.590, latMax:14.610, lngMin:120.980, lngMax:121.000},
  {name:"Aurora Blvd", latMin:14.640, latMax:14.660, lngMin:121.050, lngMax:121.080},
  {name:"Taft Ave", latMin:14.580, latMax:14.610, lngMin:120.990, lngMax:121.000}
];

// Routing
const routingControl = L.Routing.control({
  waypoints:[L.latLng(start[0],start[1]), L.latLng(end[0],end[1])],
  router:L.Routing.osrmv1({serviceUrl:'https://router.project-osrm.org/route/v1'}),
  routeWhileDragging:false,
  lineOptions:{styles:[{color:'#42e695',weight:5}]},
  createMarker: function(i, wp){
    return L.marker(wp.latLng,{
      icon:L.icon({iconUrl:i===0?'https://maps.gstatic.com/mapfiles/ms2/micons/green.png':'https://maps.gstatic.com/mapfiles/ms2/micons/red.png',iconSize:[32,32]})
    });
  }
}).addTo(map);

routingControl.on('routesfound', function(e){
  const route = e.routes[0];
  const coords = route.coordinates;
  const distanceKm = (route.summary.totalDistance/1000).toFixed(2);
  const durationMin = Math.round(route.summary.totalTime/60);
  document.getElementById('distance').innerText = 'Distance: '+distanceKm+' km';
  document.getElementById('duration').innerText = 'Duration: '+durationMin+' mins';

  // Transportation suggestions
  const transports = [
    {type:"Jeep/Bus", rate:10},
    {type:"MRT/LRT", rate:12},
    {type:"Grab/Taxi", rate:25}
  ];
  const tlist = document.getElementById('transport-list'); tlist.innerHTML="";
  transports.forEach(t=>{
    const li=document.createElement('li'); li.textContent=`${t.type}: approx. ₱${Math.round(distanceKm*t.rate)}`;
    tlist.appendChild(li);
  });

  // Simulated traffic alerts
  const alerts = [
    "Heavy traffic near EDSA Quezon Ave",
    "Construction on España Blvd",
    "Accident near C.M. Recto"
  ];
  const alertList=document.getElementById('alert-list'); alertList.innerHTML="";
  alerts.forEach(a=>{ const li=document.createElement('li'); li.textContent=a; alertList.appendChild(li); });

  // Highlight route with traffic zones
  let segment = [];
  coords.forEach((c,i)=>{
    // Check if coordinate is in any traffic zone
    let inTraffic = trafficZones.some(zone=>{
      return c.lat >= zone.latMin && c.lat <= zone.latMax && c.lng >= zone.lngMin && c.lng <= zone.lngMax;
    });
    if(segment.length>0 && segment[segment.length-1].traffic !== inTraffic){
      // Draw previous segment
      L.polyline(segment.map(s=>[s.lat,s.lng]),{color:segment[0].traffic?'red':'#42e695',weight:6}).addTo(map);
      segment = [];
    }
    segment.push({lat:c.lat,lng:c.lng,traffic:inTraffic});
  });
  if(segment.length>0){
    L.polyline(segment.map(s=>[s.lat,s.lng]),{color:segment[0].traffic?'red':'#42e695',weight:6}).addTo(map);
  }
});

// Crowdsourced reporting
const reportList=document.getElementById('report-list');
function submitReport(){
  const text=document.getElementById('report-text').value;
  if(text===""){ alert("Enter a description"); return; }
  const li=document.createElement('li'); li.textContent=text; reportList.appendChild(li);
  document.getElementById('report-text').value="";
}
</script>
</body>
</html>
