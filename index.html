<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMMUTEIQ Map - OSM Leaflet</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
<style>
  html, body { height: 100%; margin: 0; }
  #map { width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
const map = L.map('map').setView([14.646, 121.035], 12);

// OSM tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Predefined Metro Manila locations
const locations = {
  "Quezon City":[14.6760, 121.0437],
  "FEU Diliman":[14.6543, 121.0734],
  "FEU Manila":[14.6090, 120.9920],
  "FEU Alabang":[14.4144, 121.0419],
  "Makati City":[14.5547, 121.0244],
  "Pasig City":[14.5764, 121.0851],
  "Taguig City":[14.5176, 121.0509],
  "Manila City":[14.5995, 120.9842],
  "Caloocan City":[14.7569, 121.0450],
  "Pasay City":[14.5366, 121.0011]
};

// Get start/end from URL
const urlParams = new URLSearchParams(window.location.search);
const startName = urlParams.get('start') || "Quezon City";
const endName = urlParams.get('end') || "Makati City";

const start = locations[startName];
const end = locations[endName];

if(!start || !end) alert("Invalid start/end location.");

// Add routing control using OSRM demo server
L.Routing.control({
  waypoints: [
    L.latLng(start[0], start[1]),
    L.latLng(end[0], end[1])
  ],
  router: L.Routing.osrmv1({
    serviceUrl: 'https://router.project-osrm.org/route/v1'
  }),
  routeWhileDragging: false,
  lineOptions: {
    styles: [{ color: '#42e695', weight: 5 }]
  },
  createMarker: function(i, wp) {
    return L.marker(wp.latLng, {
      icon: L.icon({
        iconUrl: i === 0 ? 'https://maps.gstatic.com/mapfiles/ms2/micons/green.png' : 'https://maps.gstatic.com/mapfiles/ms2/micons/red.png',
        iconSize: [32, 32]
      })
    });
  }
}).addTo(map);

</script>
</body>
</html>
